# 用于 DocFX 文档的构建和部署
name: Build and Deploy DocFX Documentation

on:
  # 当推送到 main 分支时触发
  # push:
   #  branches: ["main"]
    # paths:
    #   - 'docs/**'
  # 允许从 Actions 选项卡手动触发
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Install DocFX
        run: dotnet tool install -g docfx
      
      - name: Create localpackages directory
        run: mkdir -p localpackages
          
      - name: Build Analyzer.Package
        run: dotnet pack tools/Analyzer/Analyzer.Package/Analyzer.Package.csproj -c Release -o ./localpackages

      - name: Build documentation
        run: docfx src/Proxar.Core/docs/docfx.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/Proxar.Core/docs/_site

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
